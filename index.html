<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="ENGSE203 Modern JavaScript Learning Dashboard"
    />
    <title>Learning Dashboard</title>
  </head>

  <body>
    <main class="container">
      <header class="hero">
        <p class="eyebrow">ENGSE203 · LAB 02</p>
        <h1>Modern JavaScript Learning Dashboard</h1>
        <p>ติดตามหัวข้อการเรียนรู้และความคืบหน้าของรายวิชา</p>
      </header>

      <div
        id="app-message"
        class="message"
        role="status"
        aria-live="polite"
      ></div>

      <section
        id="stats"
        class="stats"
        aria-label="สถิติการเรียนรู้"
      ></section>

      <section class="controls" aria-label="ตัวกรองรายการ">
        <label>
          ค้นหา
          <input
            id="search"
            type="search"
            placeholder="ค้นหาชื่อ หัวข้อ หรือแท็ก"
          />
        </label>

        <label>
          สถานะ
          <select id="status-filter">
            <option value="all">ทั้งหมด</option>
            <option value="todo">To do</option>
            <option value="doing">In progress</option>
            <option value="done">Done</option>
          </select>
        </label>
      </section>

      <section
        id="task-list"
        class="task-list"
        aria-label="รายการหัวข้อการเรียนรู้"
      ></section>
    </main>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
